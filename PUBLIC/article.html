<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirection — Blog Swayup studio</title>
  <link rel="canonical" href="https://swayup-studio.com/blog/" />
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const slug = (params.get('slug') || '').trim().replace(/^\/+|\/+$/g, '');
      const safeSlug = slug
        .split('/')
        .filter(Boolean)
        .map((segment) => segment.replace(/[^a-zA-Z0-9_-]/g, '-'))
        .join('/');

      if (safeSlug) {
        const encodedSlug = safeSlug
          .split('/')
          .map((segment) => encodeURIComponent(segment))
          .join('/');
        window.location.replace(`./blog/${encodedSlug}/`);
        return;
      }

      window.location.replace('./blog/');
    })();
  </script>
</head>
<body>
  <p>Redirection en cours vers le blog…</p>
  <p><a href="./blog/">Aller au blog</a></p>
</body>
</html>
